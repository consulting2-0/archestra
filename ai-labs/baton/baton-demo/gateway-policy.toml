# Policy for the external-auditor scenario (see README): tool contracts and
# authorities in the canonical baton-contracts dialect. The simulated tools
# these contracts govern live in gateway.toml; the two join by tool name.

[[authority]]
name = "human-in-the-loop"
rule = "escalate"
# Whom this authority may endorse data for — explicit, no wildcards.
audience = ["alice@archestra.ai", "bob@archestra.ai", "alex@finance-audit.com"]
# The conservative provenance fold makes an out-of-audience send both
# argument-borne (endorse) and control-borne (release), and the first egress
# grows the effect surface (accept) — one human ruling covers all of it.
may_release_control = true
acquire_effects = true
confirms = true
acknowledge_unknown = true

# Reading the invoices: nothing required (`requires = {}` — omitting the table
# entirely would mean unknown requirements, which fail closed). Results are
# readable only by the finance team and are trusted first-party data.
[[tool]]
name = "invoices_list"
requires = {}
output = { audience = ["alice@archestra.ai", "bob@archestra.ai"], trust = "trusted" }

# Sending email: every recipient (the `to` argument) must already be a reader
# of the context, and one dispatch is an egress.
[[tool]]
name = "send_email"
requires = { audience = "$.args.to" }
output = { audience = "public", trust = "trusted", effects = ["egress"] }
