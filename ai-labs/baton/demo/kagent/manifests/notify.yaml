# The webhook tools: a tiny MCP server with two tools split by destination —
# `notify(message)` POSTs to the fixed internal ops hook (OPS_HOOK_URL), and
# `http_post(url, message)` POSTs anywhere — plus the RemoteMCPServer CR that
# makes them available to kagent agents. The tools enforce nothing themselves;
# baton-proxy gates them via their declared sink audiences (policy.toml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-mcp
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels: { app: notify-mcp }
  template:
    metadata:
      labels: { app: notify-mcp }
    spec:
      containers:
        - name: notify-mcp
          image: notify-mcp:poc
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: info
            - name: OPS_HOOK_URL
              value: http://ops-hook.shop/notify
          ports:
            - containerPort: 8731
---
apiVersion: v1
kind: Service
metadata:
  name: notify-mcp
  namespace: kagent
spec:
  selector: { app: notify-mcp }
  ports:
    - port: 8731
      targetPort: 8731
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: notify-tools
  namespace: kagent
spec:
  description: Webhook notify tool for the baton demo
  protocol: STREAMABLE_HTTP
  url: http://notify-mcp.kagent:8731/mcp
  timeout: 30s
