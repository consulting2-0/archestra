# baton-proxy policy for the kagent demo.
#
# The proxy forwards to OpenRouter and gates the agent's tool calls. Only the
# tools this scenario touches are annotated; every other kagent tool is
# unregistered and passes through — gradual adoption, and unprovable flows
# route to the declared `default-allow` authority — allowed, with an audit
# line; anything it is not competent for fails closed.
#
# Every tool contract has two sections:
#   output   — how the returned information is labeled and how the call
#              modifies the trajectory. Omitted fields are UNKNOWN (fail
#              closed downstream), so every registered tool declares its
#              output explicitly; effects default to none.
#   requires — what the current trajectory must satisfy. `requires.audience`
#              is the sink's audience (who the call exposes the flow to);
#              the flow's audience must cover it.

upstream_base_url = "https://openrouter.ai/api/v1"

# The labels the trajectory starts with — the labels every user turn carries.
# User turns are trusted, so a clean investigation reaches the guarded sinks;
# the injection blocks them by tainting the flow suspicious.
#
# Audience holds PEOPLE only — never destinations. This conversation is
# team-private: readable by the operator and the SRE team. Audience folds by
# intersection, so the flow can never widen past this set.
[contracts.trajectory]
trust = "trusted"
audience = ["operator", "sre-team"]

# --- Injection vector: pod logs are third-party text, team-private. ------------
[[contracts.tool]]
name = "k8s_get_pod_logs"
output = { trust = "suspicious", audience = ["operator", "sre-team"] }

# --- Trusted readers: pure cluster state, team-private. ------------------------
[[contracts.tool]]
name = "k8s_get_resources"
output = { trust = "trusted", audience = ["operator", "sre-team"] }

[[contracts.tool]]
name = "k8s_describe_resource"
output = { trust = "trusted", audience = ["operator", "sre-team"] }

# --- Guarded sinks: a mutation may only run from a trusted flow. ---------------
# A flow tainted by suspicious log output fails this bar and is blocked.
# Outputs (mutation confirmations) are declared explicitly: under the unknown
# default an omitted output would wedge any flow continuing past a success.
[[contracts.tool]]
name = "k8s_delete_resource"
output = { trust = "trusted", audience = ["operator", "sre-team"] }
requires = { trust = "trusted" }

[[contracts.tool]]
name = "k8s_apply_manifest"
output = { trust = "trusted", audience = ["operator", "sre-team"] }
requires = { trust = "trusted" }

[[contracts.tool]]
name = "k8s_patch_resource"
output = { trust = "trusted", audience = ["operator", "sre-team"] }
requires = { trust = "trusted" }

# --- Egress sinks (both served by notify-mcp, manifests/notify.yaml). ----------
# `requires.audience` declares the sink's audience: the people a call exposes
# the flow to. The check is always the same — the flow's audience must cover
# the sink's. Outputs are the delivery receipts: trusted, team-private text.
#
# `notify` posts to one fixed destination, the internal ops hook (baked into
# notify-mcp). Its sink audience is therefore static: the people who read that
# hook. The team-private flow covers them, so status updates go through — even
# from a suspicious-tainted flow; trust and audience are independent dimensions.
[[contracts.tool]]
name = "notify"
output = { trust = "trusted", audience = ["operator", "sre-team"] }
requires = { audience = ["operator", "sre-team"] }

# `http_post` posts anywhere the model chooses. Nobody can bound who reads an
# arbitrary URL, so the sink is public — only a publicly readable flow may use
# it, and this conversation is team-private from the first user turn. The
# injected vendor tracker is blocked as "sink is public but the flow may only
# be read by: operator sre-team", regardless of trust.
#
# No `effects = ["egress"]` on either output: committing a new effect needs an
# Accept authority, and this proxy registers none — declaring it would fail
# every call closed, sanctioned or not. The sink audience is the egress
# control here.
[[contracts.tool]]
name = "http_post"
output = { trust = "trusted", audience = ["operator", "sre-team"] }
requires = { audience = "public" }

# --- Default authorizer: unknowns pass with receipts. ---------------------------
# The three readers above declare no `requires` — under fail-closed semantics
# every call to them escalates as "tool requirements unknown". This authority
# acknowledges exactly those unprovable facts, on the record; it cannot clear
# proven breaches (the trust-gated mutations and audience-gated egress above
# stay blocked without it ever being consulted).
[[contracts.authority]]
name = "default-allow"
rule = "allow"
acknowledge_unknown = true
