archestra:
  replicaCount: 4

  worker:
    replicaCount: 3

  # The Apps Hackathon video renderer runs as its own single-replica Deployment
  # (render jobs live in one process's memory) so the 4-replica web tier's polls
  # and downloads always reach the pod that holds the job. The web tier is
  # pointed at it via ARCHESTRA_APP_RECORDING_RENDERER_URL below.
  renderer:
    enabled: true

  codeRuntime:
    enabled: true
    dagger:
      managed:
        enabled: true

  # Pod Disruption Budget: ensure at least 3 of 4 pods stay running during
  # voluntary disruptions (node upgrades, autoscaling, maintenance)
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

  # Faster rolling updates: allow 2 pods to be created at once
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: "50%"

  # Vertex AI Gemini configuration
  # Uses Application Default Credentials (ADC) via GKE Workload Identity
  # instead of API keys for authentication
  env:
    ARCHESTRA_ANALYTICS: disabled
    ARCHESTRA_BETA: "true"
    ARCHESTRA_DYNAMIC_TOOL_ACCESS_ENABLED: "true"
    # BETA: auto-sync-permissions connectors (off by default everywhere else).
    # Explicit so staging keeps the feature even if ARCHESTRA_BETA is ever
    # flipped off.
    ARCHESTRA_KNOWLEDGE_BASE_AUTO_SYNC_PERMISSIONS_ENABLED: "true"
    ARCHESTRA_ENTERPRISE_LICENSE_ACTIVATED: "true"
    ARCHESTRA_ENTERPRISE_LICENSE_FULL_WHITE_LABELING: "true"
    ARCHESTRA_ENTERPRISE_LICENSE_KNOWLEDGE_BASE_ACTIVATED: "true"
    # Apps Hackathon session recording. The documented flag deliberately cannot
    # open this on a licensed deployment (see parseHackathonRecorderEnabled),
    # and staging activates the enterprise license above — so it takes the
    # separate override, which exists for exactly this deployment and is
    # deliberately absent from .env.example and the deployment docs.
    ARCHESTRA_HACKATHON_RECORDER_ENTERPRISE_OVERRIDE: "true"
    # Offload video rendering to the dedicated single-replica renderer Service
    # (see renderer.enabled above), so a render's status polls and download land
    # on the one pod that holds its in-memory job instead of scattering across
    # the 4 web replicas.
    ARCHESTRA_APP_RECORDING_RENDERER_URL: "http://archestra-platform-renderer:9000"
    ARCHESTRA_API_BASE_URL: "https://frontend.archestra.dev,https://backend.archestra.dev"
    # Dedicated origin for MCP App sandboxes so browser device permissions
    # (camera/mic/geolocation/clipboard) can be delegated to app iframes. Each
    # app renders at <hash>.sandbox.archestra.dev (a real cross-origin); without
    # this, sandboxes fall back to the frontend's opaque origin and browsers
    # block those features. Wildcard DNS + the cert-manager-issued wildcard TLS
    # secret come from archestra-ai/infra (gke/dns.tf, gke-apps/cert-manager);
    # the ingress rule + tls entry below route the sandbox hosts to the frontend.
    ARCHESTRA_MCP_SANDBOX_DOMAIN: "sandbox.archestra.dev"
    ARCHESTRA_GEMINI_VERTEX_AI_ENABLED: "true"
    ARCHESTRA_GEMINI_VERTEX_AI_PROJECT: "friendly-path-465518-r6"
    ARCHESTRA_GEMINI_VERTEX_AI_LOCATION: "us-central1"
    ARCHESTRA_BEDROCK_BASE_URL: "https://bedrock-runtime.eu-north-1.amazonaws.com"
    ARCHESTRA_BEDROCK_INFERENCE_PROFILE_PREFIX: "eu"
    ARCHESTRA_AUTH_COOKIE_DOMAIN: ".archestra.dev"
    ARCHESTRA_FRONTEND_URL: "https://frontend.archestra.dev"
    ARCHESTRA_TRUST_PROXY: "false"
    ARCHESTRA_SENTRY_ENVIRONMENT: "archestra.dev"
    ARCHESTRA_AGENTS_INCOMING_EMAIL_PROVIDER: "outlook"
    ARCHESTRA_AGENTS_INCOMING_EMAIL_OUTLOOK_MAILBOX_ADDRESS: "agents@archestraai.onmicrosoft.com"
    ARCHESTRA_AGENTS_INCOMING_EMAIL_OUTLOOK_WEBHOOK_URL: "https://backend.archestra.dev/api/webhooks/incoming-email"
    ARCHESTRA_CHAT_DEFAULT_PROVIDER: "anthropic"
    ARCHESTRA_CHAT_DEFAULT_MODEL: "claude-opus-4-5-20251101"
    ARCHESTRA_DATABASE_POOL_MAX: "8"

  diagnostics:
    enabled: true
    storageClassName: "archestra-diagnostics-rwx"
    accessModes:
      - ReadWriteMany
    heapSnapshotsNearHeapLimit: 1

  # Orchestrator configuration with Workload Identity for Vertex AI
  orchestrator:
    kubernetes:
      networkPolicy:
        # Enable SSRF protection for MCP server pods
        create: true

      rbac:
        # Namespaces backing deployment environments the platform may deploy
        # MCP servers into. Each entry gets a namespace-scoped Role + RoleBinding
        # and is surfaced to the app as ARCHESTRA_ORCHESTRATOR_ENVIRONMENT_NAMESPACES.
        environmentNamespaces:
          - env-test

      serviceAccount:
        # GKE Workload Identity binding to allow Vertex AI access via ADC
        # The GCP service account (archestra-vertex-ai@friendly-path-465518-r6.iam.gserviceaccount.com)
        # is created and bound in the archestra-ai/infra repo (gke/main.tf)
        annotations:
          iam.gke.io/gcp-service-account: archestra-vertex-ai@friendly-path-465518-r6.iam.gserviceaccount.com

      # Additional RBAC for MCP K8s operator service account
      # Grants cluster-wide read access and namespace-specific permissions for the Kubernetes MCP server
      # The ClusterRole and Roles are created in archestra-ai/infra repo (gke/archestra-rbac.tf)
      mcpServerRbac:
        additionalClusterRoleBindings:
          - clusterRoleName: archestra-cluster-reader
        additionalRoleBindings:
          # Read-only access to archestra namespace
          - roleName: archestra-namespace-reader
            namespace: archestra

  service:
    annotations:
      # GKE BackendConfig for custom health checks
      # Maps backend port (9000) and frontend port (3000) to their respective BackendConfigs
      # These BackendConfigs are defined in archestra-ai/infra repo (gke/ingress.tf)
      cloud.google.com/backend-config: '{"ports": {"9000":"archestra-platform-backend-config", "3000":"archestra-platform-frontend-config"}}'
      cloud.google.com/neg: '{"ingress": true}'

  ingress:
    enabled: true
    annotations:
      # GKE Ingress Controller configuration
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "archestra-staging-ip"
      ingress.gcp.cloud.google.com/load-balancer-type: "External"
      networking.gke.io/managed-certificates: "archestra-platform-staging-ssl"
      ingress.gcp.cloud.google.com/ssl-redirect: "true"

    hosts:
      - host: frontend.archestra.dev
        paths:
          - path: /
            port: 3000
            pathType: Prefix
      - host: backend.archestra.dev
        paths:
          - path: /
            port: 9000
            pathType: Prefix
      # MCP App sandbox origins (<hash>.sandbox.archestra.dev) go straight to
      # the backend, which serves /_sandbox/* itself and validates the Host
      # header (routing via the frontend rewrites the Host header -> 403).
      - host: "*.sandbox.archestra.dev"
        paths:
          - path: /
            port: 9000
            pathType: Prefix

    # Wildcard cert for the sandbox hosts, issued and renewed by cert-manager
    # (archestra-ai/infra, gke-apps/cert-manager). GKE combines spec.tls
    # secrets with the ManagedCertificate annotation above. The secret must
    # exist before this deploys, or ingress-gce fails to sync the Ingress.
    tls:
      - hosts:
          - "*.sandbox.archestra.dev"
        secretName: archestra-sandbox-wildcard-tls

postgresql:
  # Staging's database is Cloud SQL for PostgreSQL 18 (private IP, no public
  # endpoint), not the bundled chart, so the database's durability no longer
  # depends on the GKE node lifecycle — replacing a node used to take the only
  # database pod down with it, which is what kept staging dying at random.
  #
  # The connection string is injected by the deploy workflow from the
  # ARCHESTRA_STAGING_DATABASE_URL repo secret, so it is not in this file.
  # The chart hard-fails if external_database_url is set while this is true.
  enabled: false
